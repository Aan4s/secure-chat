name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -B verify
      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: secure-chat-jar
          path: target/secure-chat.jar
          if-no-files-found: error
          retention-days: 7
